<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhopal Dev Apps</title>
    <meta name="theme-color" content="#0B0F19">
    <meta name="description" content="Central directory for apps created by the Bhopal community with love.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Palette (Dark Theme Default) */
            --color-bg-base: #0B0F19;
            /* Very deep slate/navy */
            --color-surface: rgba(30, 41, 59, 0.5);
            --color-surface-hover: rgba(45, 55, 75, 0.7);

            --color-text-primary: #F8FAFC;
            --color-text-secondary: #94A3B8;

            --color-border: rgba(255, 255, 255, 0.06);
            --color-border-hover: rgba(99, 102, 241, 0.5);
            /* Indigo glow */

            --color-accent-blue: #3B82F6;
            --color-accent-indigo: #6366F1;
            --color-accent-purple: #8B5CF6;
            --color-accent-pink: #EC4899;

            /* Typography */
            --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --text-xs: 0.75rem;
            --text-sm: 0.875rem;
            --text-base: 1rem;
            --text-lg: 1.125rem;
            --text-xl: 1.25rem;
            --text-2xl: 1.5rem;

            /* Spacing & Borders */
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 24px;

            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-primary);
            background-color: var(--color-bg-base);
            color: var(--color-text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient Background Blobs */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out alternate;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, var(--color-accent-indigo), transparent 70%);
            animation-delay: 0s;
        }

        .blob-2 {
            bottom: -20%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, var(--color-accent-purple), transparent 70%);
            animation-delay: -5s;
        }

        .blob-3 {
            top: 40%;
            left: 50%;
            width: 40vw;
            height: 40vw;
            transform: translateX(-50%);
            background: radial-gradient(circle, var(--color-accent-blue), transparent 70%);
            opacity: 0.2;
            animation-duration: 25s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }

            100% {
                transform: translate(0, 0) scale(1);
            }
        }

        /* Layout */
        .container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        /* Header / Hero Area */
        .hero {
            text-align: center;
            margin-top: 6rem;
            margin-bottom: 4rem;
            animation: fadeDown 1s ease-out;
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 4.5rem);
            font-weight: 900;
            letter-spacing: -0.03em;
            margin-bottom: 1rem;
            line-height: 1.1;
            /* Stunning Gradient Text */
            background: linear-gradient(135deg, #FFFFFF 0%, #A5B4FC 50%, #818CF8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
        }

        .hero p {
            color: var(--color-text-secondary);
            font-size: clamp(1rem, 3vw, 1.25rem);
            font-weight: 400;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.7;
        }

        /* Apps Grid */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
            width: 100%;
            margin-bottom: 6rem;
        }

        /* Glassmorphism Card */
        .app-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            padding: 2rem;
            position: relative;
            overflow: hidden;
            transition: var(--transition-smooth);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            text-decoration: none;
            color: var(--color-text-primary);
            display: flex;
            flex-direction: column;
            animation: fadeUp 0.8s ease-out backwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Stagger animation for children */
        .app-card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .app-card:nth-child(2) {
            animation-delay: 0.2s;
        }

        .app-card:nth-child(3) {
            animation-delay: 0.3s;
        }

        /* Subtle inner glow pseudo-element */
        .app-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(800px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 255, 255, 0.06), transparent 40%);
            z-index: 1;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .app-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5), 0 0 20px rgba(99, 102, 241, 0.2);
            border-color: var(--color-border-hover);
            background: var(--color-surface-hover);
        }

        .app-card:hover::before {
            opacity: 1;
        }

        .card-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .app-icon {
            font-size: 2.5rem;
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.02) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .app-card:hover .app-icon {
            transform: scale(1.05) rotate(-5deg);
        }

        .status-badge {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(5, 150, 105, 0.1));
            color: #34d399;
            /* Emerald 400 */
            padding: 4px 12px;
            border-radius: 20px;
            font-size: var(--text-xs);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 1px solid rgba(52, 211, 153, 0.3);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.1);
        }

        .app-title {
            font-size: var(--text-2xl);
            font-weight: 800;
            margin: 0 0 0.75rem 0;
            letter-spacing: -0.01em;
            color: #FFFFFF;
        }

        .app-desc {
            color: var(--color-text-secondary);
            font-size: var(--text-sm);
            line-height: 1.7;
            margin-bottom: 2rem;
            font-weight: 400;
            flex-grow: 1;
        }

        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .tag {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #CBD5E1;
            font-size: var(--text-xs);
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .app-card:hover .tag {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .card-footer {
            display: flex;
            align-items: center;
            color: var(--color-accent-indigo);
            font-weight: 600;
            font-size: var(--text-sm);
            gap: 6px;
            margin-top: auto;
            border-top: 1px solid var(--color-border);
            padding-top: 1.5rem;
        }

        .card-footer svg {
            transition: transform 0.3s ease;
        }

        .app-card:hover .card-footer svg {
            transform: translateX(4px);
        }

        /* Footer */
        .site-footer {
            margin-top: auto;
            padding: 3rem 0;
            text-align: center;
            border-top: 1px solid var(--color-border);
            background: linear-gradient(to top, rgba(0, 0, 0, 0.3), transparent);
        }

        .site-footer p {
            color: var(--color-text-secondary);
            font-size: var(--text-sm);
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: var(--color-surface);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid var(--color-border);
            backdrop-filter: blur(10px);
        }

        .heart {
            color: var(--color-accent-pink);
            display: inline-block;
            animation: heartbeat 2s infinite ease-in-out;
            font-size: 1.1rem;
        }

        @keyframes heartbeat {

            0%,
            100% {
                transform: scale(1);
            }

            10%,
            30% {
                transform: scale(1.15);
            }

            20% {
                transform: scale(1.05);
            }
        }

        #loading {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--color-text-secondary);
            font-weight: 500;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--color-accent-indigo);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .hero {
                margin-top: 4rem;
                margin-bottom: 3rem;
            }

            .app-grid {
                grid-template-columns: 1fr;
                /* 1 column on mobile */
                gap: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <!-- Animated background -->
    <div class="ambient-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header class="hero">
            <h1>Apps Portal</h1>
            <p>Welcome to apps.bhopal.dev. This is the central directory for premium apps built by our collective.</p>
        </header>

        <main class="app-grid" id="app-grid">
            <div id="loading">
                <div class="spinner"></div>
                Loading applications...
            </div>
        </main>
    </div>

    <!-- The Requested Footer -->
    <footer class="site-footer">
        <p>
            Developed with <span class="heart">❤️</span> by Bhopal community
        </p>
    </footer>

    <script>
        // Fetch apps and render
        fetch('apps.json')
            .then(response => response.json())
            .then(apps => {
                const grid = document.getElementById('app-grid');
                grid.innerHTML = ''; // clear loading state

                apps.forEach(app => {
                    const card = document.createElement('a');
                    card.href = app.path;
                    card.className = 'app-card';
                    card.innerHTML = `
                        <div class="card-content">
                            <div class="card-header">
                                <div class="app-icon">${app.icon}</div>
                                <div class="status-badge">${app.status}</div>
                            </div>
                            <h2 class="app-title">${app.name}</h2>
                            <div class="tags">
                                ${app.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                            </div>
                            <p class="app-desc">${app.description}</p>
                            
                            <div class="card-footer">
                                Open Application
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                    <polyline points="12 5 19 12 12 19"></polyline>
                                </svg>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                // Add mouse tracking for the subtle spotlight hover effect on cards
                document.querySelectorAll('.app-card').forEach(card => {
                    card.addEventListener('mousemove', e => {
                        const rect = card.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;
                        card.style.setProperty('--mouse-x', `${x}px`);
                        card.style.setProperty('--mouse-y', `${y}px`);
                    });
                });
            })
            .catch(error => {
                document.getElementById('loading').innerHTML = 'Error loading applications structure. Please try again later.';
                console.error('Error fetching apps.json:', error);
            });
    </script>
</body>

</html>
