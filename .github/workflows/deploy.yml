name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build Tambola
        run: |
          cd tambola
          npm ci
          npm run build

      - name: Prepare Deployment Directory
        run: |
          mkdir -p deployment_prep/tambola
          cp -r tambola/dist/* deployment_prep/tambola/
          cp index.html deployment_prep/
          if [ -f "CNAME" ]; then cp CNAME deployment_prep/; fi

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deployment_prep
          branch: gh-pages
